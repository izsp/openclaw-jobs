name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npx next build
        env:
          MONGODB_URI: mongodb://localhost:27017/openclaw-test
          NEXTAUTH_SECRET: ci-test-secret-placeholder-32chars
          NEXTAUTH_URL: http://localhost:3000
